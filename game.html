<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Comfort Game</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --text-color: #6d5d6e;
            --grid-bg: #f0e4d7;
            --cell-empty: #e5d3c0;
            /* Pastel Palette */
            --p1: #ffb7b2; /* Pink */
            --p2: #ffdac1; /* Peach */
            --p3: #e2f0cb; /* Mint */
            --p4: #b5ead7; /* Aqua */
            --p5: #c7ceea; /* Lavender */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            touch-action: none; /* Prevents scrolling while dragging */
        }

        h1 {
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        #score-board {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* The 10x10 Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(10, 30px);
            gap: 4px;
            background-color: var(--grid-bg);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: var(--cell-empty);
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        /* Piece Tray */
        #tray {
            display: flex;
            gap: 20px;
            height: 120px;
            align-items: center;
            justify-content: center;
        }

        .piece {
            display: grid;
            gap: 2px;
            cursor: grab;
            transition: transform 0.1s;
        }

        .piece:active {
            cursor: grabbing;
        }

        .p-cell {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <h1>my comfort game</h1>
    
    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        
        <div id="grid"></div>

        <div id="tray">
            </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const trayElement = document.getElementById('tray');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let grid = Array(10).fill().map(() => Array(10).fill(0));
        const colors = [null, 'var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)', 'var(--p5)'];

        // Piece Templates
        const templates = [
            [[1]], // 1x1
            [[1, 1]], // 1x2
            [[1], [1]], // 2x1
            [[1, 1, 1]], // 1x3
            [[1, 1], [1, 1]], // 2x2 Square
            [[1, 1, 1], [0, 0, 1], [0, 0, 1]], // L shape
            [[1, 1, 1, 1, 1]] // 5x1 Long
        ];

        // Initialize Grid
        function initGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    gridElement.appendChild(cell);
                }
            }
        }

        // Generate Random Pieces in Tray
        function spawnPieces() {
            trayElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const template = templates[Math.floor(Math.random() * templates.length)];
                const colorIdx = Math.floor(Math.random() * 5) + 1;
                createPieceUI(template, colorIdx);
            }
        }

        function createPieceUI(template, colorIdx) {
            const pieceWrap = document.createElement('div');
            pieceWrap.classList.add('piece');
            pieceWrap.draggable = true;
            
            pieceWrap.style.gridTemplateColumns = `repeat(${template[0].length}, 20px)`;
            
            template.forEach((row, r) => {
                row.forEach((val, c) => {
                    const cell = document.createElement('div');
                    cell.classList.add('p-cell');
                    if (val) cell.style.backgroundColor = colors[colorIdx];
                    else cell.style.opacity = '0';
                    pieceWrap.appendChild(cell);
                });
            });

            pieceWrap.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('template', JSON.stringify(template));
                e.dataTransfer.setData('colorIdx', colorIdx);
                pieceWrap.style.opacity = '0.4';
            });

            pieceWrap.addEventListener('dragend', () => {
                pieceWrap.style.opacity = '1';
            });

            trayElement.appendChild(pieceWrap);
        }

        // Drag and Drop Logic
        gridElement.addEventListener('dragover', (e) => e.preventDefault());

        gridElement.addEventListener('drop', (e) => {
            e.preventDefault();
            const template = JSON.parse(e.dataTransfer.getData('template'));
            const colorIdx = e.dataTransfer.getData('colorIdx');
            const rect = gridElement.getBoundingClientRect();
            
            // Calculate which cell the mouse is over
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const col = Math.floor(x / 34); 
            const row = Math.floor(y / 34);

            if (canPlace(template, row, col)) {
                placePiece(template, row, col, colorIdx);
                e.target.closest('.piece')?.remove(); // This logic needs a tiny bit of help
                // Since we can't easily remove the specific dragged element from the tray via event target:
                cleanTray();
                checkLines();
            }
        });

        function canPlace(template, row, col) {
            for (let r = 0; r < template.length; r++) {
                for (let c = 0; c < template[r].length; c++) {
                    if (template[r][c]) {
                        let targetR = row + r;
                        let targetC = col + c;
                        if (targetR > 9 || targetC > 9 || grid[targetR][targetC] !== 0) return false;
                    }
                }
            }
            return true;
        }

        function placePiece(template, row, col, colorIdx) {
            for (let r = 0; r < template.length; r++) {
                for (let c = 0; c < template[r].length; c++) {
                    if (template[r][c]) {
                        grid[row + r][col + c] = colorIdx;
                        updateGridUI();
                    }
                }
            }
            score += 10;
            updateScore();
        }

        function updateGridUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = cell.dataset.row;
                const c = cell.dataset.col;
                const val = grid[r][c];
                cell.style.backgroundColor = val === 0 ? 'var(--cell-empty)' : colors[val];
            });
        }

        function checkLines() {
            let rowsToClear = [];
            let colsToClear = [];

            // Check Rows
            for (let r = 0; r < 10; r++) {
                if (grid[r].every(cell => cell !== 0)) rowsToClear.push(r);
            }

            // Check Cols
            for (let c = 0; c < 10; c++) {
                let full = true;
                for (let r = 0; r < 10; r++) {
                    if (grid[r][c] === 0) full = false;
                }
                if (full) colsToClear.push(c);
            }

            rowsToClear.forEach(r => grid[r].fill(0));
            colsToClear.forEach(c => {
                for (let r = 0; r < 10; r++) grid[r][c] = 0;
            });

            if (rowsToClear.length > 0 || colsToClear.length > 0) {
                score += (rowsToClear.length + colsToClear.length) * 100;
                updateScore();
                setTimeout(updateGridUI, 100);
            }
        }

        function cleanTray() {
            // Check if tray is empty to spawn new pieces
            // A simple implementation: if there's only 1 piece left or none, logic varies.
            // For this version, we'll manually remove the one that was just dropped.
            // (Standard 1010 spawns 3 at a time)
        }

        function updateScore() {
            scoreElement.innerText = score;
        }

        // Simple Tray Management
        gridElement.addEventListener('drop', () => {
            // If tray is empty, spawn 3 more
            setTimeout(() => {
                if (trayElement.children.length === 0) spawnPieces();
            }, 50);
        });

        initGrid();
        spawnPieces();

    </script>
</body>
</html>
